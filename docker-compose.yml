services:
  postgres:
    image: postgres:16
    container_name: focus-todo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: focus_todo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d focus_todo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
